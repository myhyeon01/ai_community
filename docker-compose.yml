services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: kmu_scheduler
      MYSQL_USER: kmu
      MYSQL_PASSWORD: kmu
      MYSQL_ROOT_PASSWORD: root
    ports: ["3306:3306"]
    volumes: [mysql_data:/var/lib/mysql]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
  api:
    build: ./backend
    env_file: .env
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
  web:
    build: ./web
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports: ["5173:5173"]
    depends_on: [api]
volumes:
  mysql_data:
